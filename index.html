<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#07091a">
  <title>Башня Витрины · Game Center</title>
  <meta name="description" content="Музыкальный игровой центр Витрина Разбита">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-mode="lobby">
  <main class="bt-app" id="app">
    <section class="bt-scene" id="scene" aria-label="Башня Витрины">
      <div class="bt-world" id="world">
        <img class="bt-bg" id="bg-image" src="./assets/tower/bg.webp" alt="Башня Витрины" decoding="async" fetchpriority="high">

        <header class="bt-topbar" aria-label="Профиль Game Center">
          <div class="bt-title">
            <h1>Башня Витрины</h1>
            <p>Музыкальный игровой центр</p>
          </div>
          <div class="bt-profile">
            <div class="bt-shards">
              <span class="bt-shard-icon">♦</span>
              <b id="shards-count">1250</b>
              <small>осколков</small>
            </div>
            <div class="bt-avatar" id="avatar-box">👤</div>
          </div>
        </header>

        <button class="bt-enter-game" type="button" id="enter-game">
          <span>Войти</span>
        </button>

        <button class="bt-hotspot hotspot-melody" type="button" data-door="melody" aria-label="Зал Мелодий"></button>
        <button class="bt-hotspot hotspot-words" type="button" data-door="words" aria-label="Кузница Слов"></button>
        <button class="bt-hotspot hotspot-oracle" type="button" data-door="oracle" aria-label="Оракул Текстов"></button>
        <button class="bt-hotspot hotspot-heart" type="button" data-door="heart" aria-label="Сердце Витрины"></button>
        <button class="bt-hotspot hotspot-arena" type="button" data-door="arena" aria-label="Арена Турниров"></button>
        <button class="bt-hotspot hotspot-fame" type="button" data-door="fame" aria-label="Зал Славы"></button>
        <button class="bt-hotspot hotspot-daily" type="button" data-door="daily" aria-label="Ежедневный вызов"></button>
        <button class="bt-hotspot hotspot-chest" type="button" data-door="chest" aria-label="Сундук Осколков"></button>
        <button class="bt-hotspot hotspot-collection" type="button" data-door="collection" aria-label="Коллекция"></button>

        <footer class="bt-nav" aria-label="Навигация Game Center">
          <button class="bt-nav-item nav-exit" type="button" id="exit-game" aria-label="Выход">
            <span>↩</span>
            <b>Выход</b>
          </button>
          <button class="bt-nav-item" type="button" data-door="nav:tournaments" aria-label="Турниры">
            <span>🏆</span>
            <b>Турниры</b>
          </button>
          <button class="bt-nav-item" type="button" data-door="nav:friends" aria-label="Друзья">
            <span>👥</span>
            <b>Друзья</b>
          </button>
          <button class="bt-nav-item" type="button" data-door="nav:profile" aria-label="Профиль">
            <span>●</span>
            <b>Профиль</b>
          </button>
        </footer>
      </div>

      <div class="bt-bridge-pill" id="bridge-pill">bridge: wait</div>
      <div class="bt-toast" id="toast" hidden></div>
    </section>
  </main>

  <script src="./src/app.js" defer></script>
</body>
</html>
